<html>
    <head>
        <style>
            h1 {
                text-align: center;
            }
            p {
                text-align: center;
            }
            div {
                text-align: center;
            }
            button {
                text-align: center;
            }
        </style>
        <title>
            Happy Mother's Day!
        </title>
    </head>
    <body>
        <h1>
            Happy Mother's Day!
        </h1>
        <p>
            Click this button for a suprise!
        </p>
        <div>
            <button onclick="showText()">
                Click me!
            </button>
            <p id="myMessage" style="display:none;">
                I love you Mom I hope you had a wonderful day!
            </p>
            <script>
                function showText() {
                    if document.getElementById("myMessage") = style="display:none;"
                        document.getElementById("myMessage").style.display = "block";
                }
            </script>
        </div>
    </body>
</html>
